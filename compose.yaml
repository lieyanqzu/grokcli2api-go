services:
  grokcli2api:
    image: ${GROK2API_IMAGE:-grokcli2api-go:local}
    build:
      context: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      GROK2API_HOST: 0.0.0.0
      GROK2API_PORT: ${GROK2API_PORT:-8088}
      GROK_AUTHS_DIR: /auths
    ports:
      - "${GROK2API_PORT:-8088}:${GROK2API_PORT:-8088}"
    volumes:
      - ./auths:/auths:rw
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 15s
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null "http://127.0.0.1:$${GROK2API_PORT:-8088}/"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
